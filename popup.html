<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>رابط واضح</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="logo">ر</div>
      <div>
        <h1>رابط واضح</h1>
        <p>انسخ الرابط بشكل مقروء</p>
      </div>
    </div>

    <label for="urlBox">الرابط الحالي</label>
    <textarea id="urlBox" rows="4" readonly></textarea>

    <div class="buttons">
      <button id="copyClean" class="primary">نسخ الرابط الواضح</button>
      <button id="copyNoTracking">نسخ بدون تتبّع</button>
      <button id="copyEncoded">نسخ الرابط المشفّر</button>
    </div>

    <p id="status" class="status"></p>
  </main>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
