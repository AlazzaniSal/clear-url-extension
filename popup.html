<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clear URL</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="topbar">
      <div class="brand">
        <img class="logo" src="icons/icon48.png" alt="" width="48" height="48" />
        <div>
          <h1 data-i18n="appName">Clear URL</h1>
          <p data-i18n="tagline">Copy readable links</p>
        </div>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon" aria-hidden="true"></span>
      </button>
      <div class="language-wrap">
        <label for="languageSelect" class="sr-only" data-i18n="language">Language</label>
        <select id="languageSelect" aria-label="Language">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="zh">中文</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="ja">日本語</option>
          <option value="ru">Русский</option>
          <option value="pt">Português</option>
          <option value="es">Español</option>
        </select>
      </div>
    </div>

    <section class="url-panel" aria-labelledby="currentUrlLabel">
      <label id="currentUrlLabel" for="urlBox" data-i18n="currentUrl">Current URL</label>
      <textarea id="urlBox" rows="4" readonly></textarea>
    </section>

    <div class="buttons">
      <button id="copyClean" class="primary" data-i18n="copyClean">Copy clean URL</button>
      <button id="copyNoTracking" data-i18n="copyNoTracking">Copy without tracking</button>
      <button id="copyEncoded" data-i18n="copyEncoded">Copy encoded URL</button>
    </div>

    <p id="status" class="status"></p>
  </main>
  <script src="i18n.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
